title: Quarto Typst MemoriaTFETypst
author: Pedro Luque
version: 1.4.1
quarto-required: ">=1.6.0"
contributes:
  shortcodes:
    - shortcodes.lua
  formats:
    typst:
      fig-format: "png"
      portada: true
      toc: true
      centrar-matematicas: true
      heading-style: true
      template-partials:
        - typst-template.typ
        - typst-show.typ
      filters:
        - normalize-exercise-titles.lua
        - typst-function.lua
        - boxed-filter.lua